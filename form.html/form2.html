<!-- =========================
FILE 1: index.html
Tournament Registration Form
========================= -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournament Registration</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=2070&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      padding:20px;
    }

    .container{
      width:420px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(12px);
      border-radius:15px;
      padding:30px;
      color:white;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#ffcc00;
    }

    input, select{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:15px;
    }

    button{
      width:100%;
      padding:13px;
      border:none;
      border-radius:8px;
      background:#ff9800;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    button:hover{
      background:#e68900;
    }

    .success{
      margin-top:15px;
      text-align:center;
      color:#00ff99;
      font-weight:bold;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Tournament Registration</h1>

  <form id="registrationForm">

    <input type="text" id="name" placeholder="Full Name" required>

    <input type="email" id="email" placeholder="Email Address" required>

    <input type="tel" id="phone" placeholder="Phone Number" required>

    <input type="number" id="age" placeholder="Age" required>

    <!-- CATEGORY -->
    <select id="category" required>
      <option value="">Select Category</option>

      <option value="Online">Online</option>
      <option value="Indoor">Indoor</option>
      <option value="Outdoor">Outdoor</option>
    </select>

    <!-- TOURNAMENT OPTIONS -->
    <select id="game" required>
      <option value="">Select Tournament</option>
    </select>

    <button type="submit">Register Now</button>

    <div class="success" id="successMsg"></div>

  </form>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXXXXXX",
  appId: "XXXXXXXX"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* =========================
   CATEGORY OPTIONS
========================= */

const tournaments = {

  Online: [
    "BGMI",
    "Free Fire",
    "Valorant",
    "Call Of Duty"
  ],

  Indoor: [
    "Chess",
    "Table Tennis",
    "Carrom",
    "Badminton"
  ],

  Outdoor: [
    "Cricket",
    "Football",
    "Kabaddi",
    "Basketball"
  ]

};

const categorySelect = document.getElementById("category");
const gameSelect = document.getElementById("game");


categorySelect.addEventListener("change", () => {

  const selectedCategory = categorySelect.value;

  gameSelect.innerHTML =
    `<option value="">Select Tournament</option>`;

  tournaments[selectedCategory].forEach((game) => {

    const option = document.createElement("option");

    option.value = game;
    option.textContent = game;

    gameSelect.appendChild(option);

  });

});


/* =========================
   FORM SUBMIT
========================= */

const form = document.getElementById("registrationForm");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const data = {

    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    age: document.getElementById("age").value,

    category: document.getElementById("category").value,
    game: document.getElementById("game").value,

    time: new Date().toLocaleString()

  };

  try {

    await addDoc(collection(db, "registrations"), data);

    successMsg.innerText = "Registration Successful!";

    form.reset();

    gameSelect.innerHTML =
      `<option value="">Select Tournament</option>`;

  } catch (error) {

    console.log(error);

    successMsg.innerText = "Something went wrong!";

  }

});

</script>

</body>
</html>
