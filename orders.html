<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Gaming Hub</title>
    <meta name="description" content="View your Gaming Hub order history and track deliveries.">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ── Orders Page Styles ── */
        .orders-hero {
            padding: 7rem 2rem 3rem;
            text-align: center;
            background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.18) 0%, transparent 70%);
            position: relative;
            overflow: hidden;
        }
        .orders-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="1" fill="rgba(99,102,241,0.3)"/><circle cx="80" cy="60" r="1.5" fill="rgba(0,255,136,0.2)"/><circle cx="50" cy="80" r="1" fill="rgba(0,212,255,0.2)"/></svg>');
            background-size: 200px;
            animation: float 20s linear infinite;
            pointer-events: none;
        }
        @keyframes float {
            from { background-position: 0 0; }
            to { background-position: 200px 200px; }
        }
        .orders-hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.4);
            border-radius: 50px;
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: var(--neon-blue);
            margin-bottom: 1.5rem;
            animation: fade-in 0.6s ease;
        }
        .orders-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            color: #fff;
            margin: 0 0 0.75rem;
            animation: fade-in 0.7s ease;
        }
        .orders-hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            animation: fade-in 0.8s ease;
        }

        /* Stats Bar */
        .orders-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto 3rem;
        }
        .stat-chip {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem 2rem;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.25s, border-color 0.25s;
            min-width: 140px;
        }
        .stat-chip:hover {
            transform: translateY(-4px);
            border-color: rgba(99,102,241,0.5);
        }
        .stat-chip .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--neon-blue), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-chip .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Orders Container */
        .orders-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
        }

        /* Filter Tabs */
        .orders-filter-bar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            align-items: center;
        }
        .orders-filter-bar span {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }
        .filter-tab {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            border-radius: 50px;
            padding: 0.45rem 1.2rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
        }
        .filter-tab:hover, .filter-tab.active {
            background: rgba(99,102,241,0.18);
            border-color: var(--primary);
            color: #fff;
        }

        /* Order Card */
        .order-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(12px);
            animation: slide-in 0.5s ease both;
            transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
            position: relative;
            overflow: hidden;
        }
        .order-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: 20px 0 0 20px;
        }
        .order-card.status-delivered::before { background: linear-gradient(to bottom, #00ff88, #00d4ff); }
        .order-card.status-processing::before { background: linear-gradient(to bottom, #f59e0b, #f97316); }
        .order-card.status-shipped::before { background: linear-gradient(to bottom, #6366f1, #8b5cf6); }
        .order-card.status-cancelled::before { background: linear-gradient(to bottom, #ef4444, #dc2626); }

        .order-card:hover {
            border-color: rgba(99,102,241,0.4);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(99,102,241,0.12);
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Order Header */
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.25rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .order-id-section .order-id {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        .order-id-section .order-id span {
            color: var(--neon-blue);
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
        }
        .order-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .order-date i { margin-right: 0.3rem; }

        /* Status Badge */
        .order-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .order-status-badge.delivered { background: rgba(0,255,136,0.12); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
        .order-status-badge.processing { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .order-status-badge.shipped    { background: rgba(99,102,241,0.12); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
        .order-status-badge.cancelled  { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .delivered .status-dot { background: #00ff88; animation: pulse-dot 2s infinite; }
        .processing .status-dot { background: #f59e0b; animation: pulse-dot 2s infinite; }
        .shipped .status-dot    { background: #818cf8; }
        .cancelled .status-dot  { background: #ef4444; }
        @keyframes pulse-dot {
            0%,100% { opacity:1; transform: scale(1); }
            50%      { opacity:.5; transform: scale(1.5); }
        }

        /* Order Items */
        .order-items {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .order-item-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .order-item-img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
        }
        .order-item-icon {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(99,102,241,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--primary);
            flex-shrink: 0;
        }
        .order-item-info { flex: 1; min-width: 0; }
        .order-item-name {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .order-item-category {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 0.15rem;
        }
        .order-item-price {
            font-weight: 700;
            color: var(--neon-blue);
            font-size: 0.95rem;
            white-space: nowrap;
            font-family: 'Outfit', sans-serif;
        }

        /* Order Footer */
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--glass-border);
        }
        .order-total-section .order-total-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .order-total-value {
            font-size: 1.35rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .order-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .btn-order-action {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
        }
        .btn-order-action:hover {
            background: rgba(99,102,241,0.15);
            border-color: var(--primary);
            color: #fff;
            transform: translateY(-1px);
        }
        .btn-order-action.reorder {
            background: linear-gradient(135deg, var(--primary), var(--neon-blue));
            border-color: transparent;
            color: #fff;
        }
        .btn-order-action.reorder:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Tracking Bar */
        .tracking-bar {
            display: flex;
            align-items: center;
            gap: 0;
            margin: 1.25rem 0 0;
            padding-top: 1.25rem;
            border-top: 1px solid var(--glass-border);
        }
        .tracking-step {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .tracking-step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 14px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: var(--glass-border);
        }
        .tracking-step.done:not(:last-child)::after {
            background: linear-gradient(to right, var(--neon-blue), var(--primary));
        }
        .tracking-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid var(--glass-border);
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }
        .tracking-step.done .tracking-icon {
            background: linear-gradient(135deg, var(--primary), var(--neon-blue));
            border-color: transparent;
            color: #fff;
        }
        .tracking-step.current .tracking-icon {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 10px rgba(99,102,241,0.5);
        }
        .tracking-label {
            font-size: 0.68rem;
            color: var(--text-secondary);
            margin-top: 0.4rem;
            text-align: center;
            white-space: nowrap;
        }
        .tracking-step.done .tracking-label,
        .tracking-step.current .tracking-label { color: #fff; }

        /* Empty State */
        .orders-empty {
            text-align: center;
            padding: 5rem 2rem;
        }
        .orders-empty-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(0,212,255,0.3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }
        .orders-empty h2 {
            font-size: 1.75rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: #fff;
            margin: 0 0 0.75rem;
        }
        .orders-empty p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .order-header { flex-direction: column; align-items: flex-start; }
            .order-footer { flex-direction: column; align-items: flex-start; }
            .tracking-label { display: none; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar glass-panel">
        <div class="nav-brand">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <span class="neon-text">Gaming</span> Hub
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html#hero">Home</a>
            <a href="index.html#categories">Categories</a>
            <a href="index.html#builder">PC Builder</a>
            <a href="index.html#products">Hardware</a>
            <a href="orders.html" class="active" style="color: var(--neon-blue);">My Orders</a>
            <a href="lucky-wheel.html" class="lucky-spin-btn"><i class="fas fa-dharmachakra"></i> Lucky Spin</a>
        </div>
        <div class="nav-actions">
            <button class="icon-btn cart-btn"><i class="fas fa-shopping-cart"></i> <span class="cart-count">0</span></button>
            <button class="btn btn-primary login-btn">Login</button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="orders-hero">
        <div class="orders-hero-badge">
            <i class="fas fa-box-open"></i> Order History
        </div>
        <h1>My <span class="neon-text">Orders</span></h1>
        <p>Track your deliveries and review your past purchases</p>
    </section>

    <!-- Stats -->
    <div class="orders-stats" id="orders-stats">
        <div class="stat-chip">
            <div class="stat-value" id="stat-total-orders">0</div>
            <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-chip">
            <div class="stat-value" id="stat-total-spent">$0</div>
            <div class="stat-label">Total Spent</div>
        </div>
        <div class="stat-chip">
            <div class="stat-value" id="stat-items-bought">0</div>
            <div class="stat-label">Items Bought</div>
        </div>
        <div class="stat-chip">
            <div class="stat-value" id="stat-delivered">0</div>
            <div class="stat-label">Delivered</div>
        </div>
    </div>

    <!-- Main -->
    <div class="orders-wrapper">
        <!-- Filter Bar -->
        <div class="orders-filter-bar">
            <span>Filter:</span>
            <button class="filter-tab active" data-filter="all" id="filter-all">All Orders</button>
            <button class="filter-tab" data-filter="delivered" id="filter-delivered">Delivered</button>
            <button class="filter-tab" data-filter="shipped" id="filter-shipped">Shipped</button>
            <button class="filter-tab" data-filter="processing" id="filter-processing">Processing</button>
            <button class="filter-tab" data-filter="cancelled" id="filter-cancelled">Cancelled</button>
        </div>

        <!-- Orders List -->
        <div id="orders-list">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Cart Modal (shared) -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-modal glass-panel" id="cart-modal">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-btn" id="close-cart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">$0.00</span>
            </div>
            <button class="btn btn-neon w-100" id="checkout-btn">Checkout</button>
        </div>
    </div>

    <div class="auth-overlay" id="auth-overlay"></div>
    <div class="auth-modal glass-panel" id="auth-modal">
        <div class="auth-header">
            <h3 style="margin: 0; font-size: 1.5rem;">Login to <span class="neon-text">Gaming Hub</span></h3>
            <button class="close-btn" id="close-auth"><i class="fas fa-times"></i></button>
        </div>
        <div class="auth-body">
            <form id="login-form" class="checkout-form">
                <input type="email" id="orders-login-email" name="email" placeholder="Email Address" required autocomplete="email" style="pointer-events: auto;">
                <input type="password" id="orders-login-password" name="password" placeholder="Password" required autocomplete="current-password" style="pointer-events: auto;">
                <button type="submit" class="btn btn-neon w-100" style="margin-top: 1rem;">Sign In</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
