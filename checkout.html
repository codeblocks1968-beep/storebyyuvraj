<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Gaming Hub</title>
    <meta name="description" content="Secure checkout for Gaming Hub.">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar glass-panel">
        <div class="nav-brand">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <span class="neon-text">Gaming</span> Hub
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html#hero">Home</a>
            <a href="index.html#categories">Categories</a>
            <a href="index.html#builder">PC Builder</a>
            <a href="index.html#products">Hardware</a>
            <a href="orders.html">My Orders</a>
        </div>
    </nav>

    <!-- Checkout Section -->
    <section class="checkout-page" style="padding-top: 8rem; min-height: 100vh;">
        <h2 class="section-title">Secure <span class="neon-text">Checkout</span></h2>
        
        <div class="checkout-container">
            <div class="checkout-form-container glass-panel">
                <form id="page-checkout-form" class="checkout-form">
                    <div class="form-section">
                        <h4>Shipping Information</h4>
                        <input type="text" placeholder="Full Name" required>
                        <input type="email" placeholder="Email Address" required>
                        <input type="text" placeholder="Shipping Address" required>
                        <div class="form-row">
                            <input type="text" placeholder="City" required>
                            <input type="text" placeholder="Zip Code" required>
                        </div>
                    </div>
                    <div class="form-section">
                        <h4>Payment Details</h4>
                        <input type="text" placeholder="Card Number" required>
                        <div class="form-row">
                            <input type="text" placeholder="MM/YY" required>
                            <input type="text" placeholder="CVV" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-neon w-100" id="page-place-order-btn">Place Order</button>
                </form>
            </div>
            
        <div class="checkout-summary glass-panel">
                <h3>Order Summary</h3>

                <!-- Product count badge -->
                <div id="checkout-item-count" style="
                    display: inline-flex;
                    align-items: center;
                    gap: 0.5rem;
                    margin-top: 0.75rem;
                    background: rgba(0,243,255,0.1);
                    border: 1px solid rgba(0,243,255,0.3);
                    border-radius: 30px;
                    padding: 0.35rem 1rem;
                    font-size: 0.85rem;
                    font-weight: 600;
                    color: var(--neon-blue);
                ">
                    <i class="fas fa-shopping-cart" style="font-size:0.8rem;"></i>
                    <span id="item-count-text">0 items in cart</span>
                </div>

                <div class="checkout-items" id="checkout-items">
                    <!-- Rendered by JS -->
                </div>
                <div class="promo-section" style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
                    <div class="flex gap-2" style="display: flex; gap: 0.5rem;">
                        <input type="text" id="promo-input" placeholder="Promo Code" class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-sm w-full" style="background: rgba(255,255,255,0.92); border: 1px solid var(--glass-border); border-radius: 8px; color: #111; padding: 0.5rem 1rem; width: 100%; font-weight: 500;">
                        <button type="button" id="apply-promo-btn" class="btn btn-primary btn-sm">Apply</button>
                    </div>
                    <p id="promo-status" class="text-xs mt-2" style="font-size: 0.75rem; margin-top: 0.5rem;"></p>
                </div>
                <div class="cart-total mt-1 pt-1" style="border-top: 1px solid var(--glass-border); margin-top: 1rem; padding-top: 1rem;">
                    <div id="discount-row" style="display: none; justify-content: space-between; margin-bottom: 0.5rem; color: var(--neon-green);">
                        <span>Discount:</span>
                        <span id="discount-amount">-$0.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2rem;">
                        <span>Total:</span>
                        <span id="checkout-total-price">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Success Modal -->
    <div class="success-overlay" id="success-overlay"></div>
    <div class="success-modal glass-panel" id="success-modal">
        <i class="fas fa-check-circle success-icon"></i>
        <h3>Order Placed!</h3>
        <p>Your premium hardware is on its way. Check your email for details.</p>
        <div style="display:flex; gap:1rem; justify-content:center; margin-top:1rem; flex-wrap:wrap;">
            <button class="btn btn-primary" id="return-home-btn">Return to Home</button>
            <a href="orders.html" class="btn btn-outline" style="display:inline-block;">View My Orders</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
