<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin - Gaming Hub</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--bg-darker);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .lucky-page-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.1), transparent 70%);
            position: relative;
        }
        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
        }
        .wheel-container-wrapper {
            animation: fadeIn 0.8s ease-out;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 60px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="btn btn-outline back-home">
        <i class="fas fa-arrow-left"></i> &nbsp; Back to Store
    </a>

    <div class="lucky-page-container">
        <div class="wheel-container-wrapper">
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <div class="wheel-main" id="wheel-main">
                    <div class="wheel-segment"><span>50% OFF</span></div>
                    <div class="wheel-segment"><span>10% OFF</span></div>
                    <div class="wheel-segment"><span>BOGO FREE</span></div>
                    <div class="wheel-segment"><span>NO OFFER</span></div>
                </div>
                <div class="wheel-center" id="spin-trigger"></div>
            </div>
            
            <div class="wheel-content" style="margin-left: 4rem;">
                <div id="wheel-intro">
                    <h2 style="font-size: 3.5rem; margin-bottom: 1rem;">Test Your <span class="neon-text">Luck!</span></h2>
                    <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.2rem;">Spin the wheel to unlock exclusive premium discounts. You only get one shot, so make it count!</p>
                    <button class="btn btn-neon w-100" id="btn-spin-now" style="padding: 1.2rem; font-size: 1.1rem;">Spin the Wheel</button>
                </div>

                <div id="wheel-reward" class="reward-display">
                    <h2 style="font-size: 3.5rem; margin-bottom: 1rem;">Winner <span class="neon-text">Winner!</span></h2>
                    <p id="reward-message" style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.2rem;">Congratulations! Use the code below at checkout.</p>
                    <div class="reward-code" id="reward-code-text">GAMING50</div>
                    <button class="btn btn-primary w-100" id="btn-claim-reward">Go Shopping</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <script src="js/wheel.js"></script>
</body>
</html>
